# release — manually triggered workflow that cuts a CalVer release.
# Creates the tag first so git-cliff sections the changelog under the new version,
# then opens a PR with the updated CHANGELOG.md. Merge the PR via the GitHub UI to publish.
# Tag format: v<year>.<month>.<n> (e.g. v2026.04.1); always increments patch from latest tag.
name: Release

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    name: Tag and open release PR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute CalVer tag
        id: tag
        run: |
          base="v$(date +%Y.%m)"
          latest_n=$(git ls-remote --tags origin "refs/tags/${base}.*" \
            | grep -oE '[0-9]+$' | sort -n | tail -1)
          if [ -n "$latest_n" ]; then
            tag="${base}.$((latest_n + 1))"
          else
            tag="${base}.1"
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "==> Will create tag: ${tag}"

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.tag.outputs.tag }}" -m "Release ${{ steps.tag.outputs.tag }}"
          git push origin "${{ steps.tag.outputs.tag }}"

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --verbose
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Open release PR
        run: |
          branch="chore/release-${{ steps.tag.outputs.tag }}"
          git checkout -b "${branch}"
          git add CHANGELOG.md
          if git diff --staged --quiet; then
            echo "No changelog changes — skipping PR."
            exit 0
          fi
          git commit -m "chore(changelog): update CHANGELOG.md for ${{ steps.tag.outputs.tag }}"
          git push origin "${branch}"
          gh pr create \
            --title "chore(release): ${{ steps.tag.outputs.tag }}" \
            --body "Automated release PR — merges the changelog update for \`${{ steps.tag.outputs.tag }}\` into \`main\`." \
            --base main \
            --head "${branch}"
        env:
          GH_TOKEN: ${{ github.token }}

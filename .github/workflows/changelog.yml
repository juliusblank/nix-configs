# changelog — regenerates CHANGELOG.md on every merge to main using git-cliff.
# Commits the updated file directly to main using GITHUB_TOKEN (does not re-trigger workflows).
name: Changelog

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  update-changelog:
    name: Update changelog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --verbose
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Commit changelog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --staged --quiet || git commit -m "chore(changelog): update CHANGELOG.md"
          git push

# CI — runs nix flake check and builds the active host config (serenity) on every push to main
# and on every pull request targeting main. Runs on macos-14 so the serenity darwin config can be
# built for real (not --dry-run). AWS credentials are obtained via OIDC (no stored keys).
# On merge to main, a separate macos-14 job pushes the full serenity closure to the S3 nix binary
# cache. The cache signing key is read from 1Password at runtime.
#
# ci-passed is a fan-in aggregator and is the required status check for all PRs. It always runs
# and passes as long as every job that did run succeeded. Jobs that are skipped count as passing.
name: CI

on:
  push:
    branches: [main]
    paths:
      - 'flake.nix'
      - 'flake.lock'
      - 'shell.nix'
      - 'hosts/**'
      - 'home/**'
      - 'overlays/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]

permissions:
  id-token: write   # OIDC
  contents: read

jobs:
  # Skipped on release PRs (chore/release-*) — no nix files change there.
  check-flake:
    name: Check flake
    runs-on: macos-14
    if: "!startsWith(github.head_ref, 'chore/release-')"
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            substituters = https://cache.nixos.org https://juliusblank-nix-cache.s3.eu-central-1.amazonaws.com
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= juliusblank-nix-cache:4dcYEtIVp1o7kLv6cGGYoMTMhg83XmSjfNA9l+In+SI=

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-central-1

      - name: Nix flake check
        run: nix flake check --no-build

      # Build all configs (catches eval errors)
      - name: Build serenity
        run: nix build .#darwinConfigurations.serenity.system

      # - name: Build macbook-work
      #   run: nix build .#darwinConfigurations.macbook-work.system --dry-run

      # - name: Build pi-moodpi
      #   run: nix build .#nixosConfigurations.pi-moodpi.config.system.build.toplevel --dry-run

  # Only runs on release PRs (chore/release-*). Validates tag exists and changelog is correct.
  validate-release:
    name: Validate release
    runs-on: ubuntu-latest
    if: startsWith(github.head_ref, 'chore/release-')
    steps:
      - uses: actions/checkout@v4

      - name: Validate tag and changelog
        run: |
          tag="${GITHUB_HEAD_REF#chore/release-}"
          echo "==> Validating release: ${tag}"

          # Tag must exist on the remote
          if ! git ls-remote --tags origin "refs/tags/${tag}" | grep -q .; then
            echo "ERROR: tag ${tag} not found on remote"
            exit 1
          fi

          # CHANGELOG.md must contain a section header for this tag
          if ! grep -q "## ${tag}" CHANGELOG.md; then
            echo "ERROR: no section for ${tag} found in CHANGELOG.md"
            exit 1
          fi

          # No conflict markers
          if grep -qE '^(<<<<<<<|=======|>>>>>>>)' CHANGELOG.md; then
            echo "ERROR: conflict markers found in CHANGELOG.md"
            exit 1
          fi

          echo "==> All release checks passed for ${tag}"

  # Fan-in aggregator — always runs, always the required status check.
  # Passes if every job that ran succeeded; skipped jobs are treated as passing.
  ci-passed:
    name: CI passed
    runs-on: ubuntu-latest
    needs: [check-flake, validate-release]
    if: always()
    steps:
      - name: Check all jobs passed or were skipped
        run: |
          flake="${{ needs.check-flake.result }}"
          release="${{ needs.validate-release.result }}"
          echo "check-flake=${flake}, validate-release=${release}"
          for result in "$flake" "$release"; do
            if [[ "$result" == "failure" || "$result" == "cancelled" ]]; then
              echo "ERROR: a required job failed"
              exit 1
            fi
          done
          echo "All checks passed or were skipped"

  # Push the serenity closure to the S3 nix binary cache after every merge to main.
  # Runs on macos-14 (aarch64-darwin) so the build is native and the closure is complete.
  push-cache:
    name: Push cache
    runs-on: macos-14
    needs: check-flake
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            substituters = https://cache.nixos.org https://juliusblank-nix-cache.s3.eu-central-1.amazonaws.com
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= juliusblank-nix-cache:4dcYEtIVp1o7kLv6cGGYoMTMhg83XmSjfNA9l+In+SI=

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-central-1

      - name: Load signing key from 1Password
        uses: 1password/load-secrets-action@v2
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          NIX_CACHE_SIGNING_KEY: "op://github_nix-configs/Nix Cache Signing Key/private_key"

      - name: Build serenity
        run: nix build .#darwinConfigurations.serenity.system

      - name: Push closure to S3 cache
        run: |
          echo "$NIX_CACHE_SIGNING_KEY" > /tmp/cache-priv-key.pem
          store_path=$(readlink result)
          nix store sign --key-file /tmp/cache-priv-key.pem --recursive "$store_path"
          nix copy --to "s3://${{ vars.NIX_CACHE_BUCKET }}?region=eu-central-1" "$store_path"
          rm /tmp/cache-priv-key.pem

# CI — runs nix flake check and builds the active host config (serenity) on every push to main
# and on every pull request targeting main. AWS credentials are obtained via OIDC (no stored keys).
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  id-token: write   # OIDC
  contents: read

jobs:
  check-flake:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixpkgs-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-central-1

      - name: Nix flake check
        run: nix flake check --no-build

      # Build all configs (catches eval errors)
      - name: Build serenity
        run: nix build .#darwinConfigurations.serenity.system --dry-run

      # - name: Build macbook-work
      #   run: nix build .#darwinConfigurations.macbook-work.system --dry-run

      # - name: Build pi-moodpi
      #   run: nix build .#nixosConfigurations.pi-moodpi.config.system.build.toplevel --dry-run
